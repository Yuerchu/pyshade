"$schema" = "https://schema.tauri.app/config/2"
productName = "pyshade-task-board"
version = "0.1.0"
identifier = "cn.yuxiaoqiu.pyshade.task-board"

[build]
# 运行时被 tauri_config 覆盖(dev: vite dev server;生产: frontend/dist 相对路径)
frontendDist = "./frontend"

[app]
withGlobalTauri = true

[[app.windows]]
title = "PyShade Task Board"
width = 480
height = 720
