name: Docs

# 文档站(design.md §3.10):双 locale 静态构建 → Cloudflare Pages。
# 构建链走 wheel 路径(与用户现实一致);未配置 CF secrets 时只构建不部署。
on:
  push:
    branches: [main]
    paths:
      - 'docs_site/**'
      - 'src/pyshade/**'
      - 'frontend/**'
      - 'scripts/build_vendor.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: '1'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PYSHADE_DOCS_BASE_URL: ${{ vars.PYSHADE_DOCS_BASE_URL || 'https://pyshade-docs.pages.dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'
      - run: uv sync --group dev
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend build:css
      - name: Materialize vendor tree
        run: uv run python scripts/build_vendor.py
      - run: uv build --wheel
      - name: Install wheel into clean venv (+content extra deps)
        run: |
          uv venv .venv-docs --python 3.13
          uv pip install --python .venv-docs dist/pyshade-*.whl mistune pygments
      - name: Build docs site (en + zh, llms.txt, md snapshots)
        run: .venv-docs/bin/python docs_site/build.py --out dist-docs
        env:
          PYTHONPATH: docs_site/src
      - name: Assert site layout
        run: |
          for f in index.html llms.txt llms-full.txt \
                   en/index.html en/app.js en/style.css en/demo-mock.js en/llms.txt \
                   zh/index.html zh/demo-mock.js zh/llms.txt \
                   en/md/components/Button.md zh/md/guides/quickstart.md; do
            test -f "dist-docs/$f" || { echo "缺 $f"; exit 1; }
          done
          grep -q 'demo-mock.js' dist-docs/en/index.html
          echo "site layout OK ($(du -sh dist-docs | cut -f1))"
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: dist-docs/
      - name: Deploy to Cloudflare Pages
        if: env.CF_TOKEN != '' && github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-docs --project-name=pyshade-docs
      - name: Deploy skipped (CF secrets 未配置)
        if: env.CF_TOKEN == ''
        run: echo "未配置 CLOUDFLARE_API_TOKEN,跳过部署;产物见 docs-site artifact"
