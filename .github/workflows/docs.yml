name: Docs

# 文档站(design.md §3.10):双 locale 静态构建 → Cloudflare Pages。
# 构建链走 wheel 路径(与用户现实一致);未配置 CF secrets 时只构建不部署。
on:
  push:
    branches: [main]
    paths:
      - 'docs_site/**'
      - 'src/pyshade/**'
      - 'frontend/**'
      - 'scripts/build_vendor.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUTF8: '1'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      # CF secrets 不进 job 级 env:构建全链路(pip/npm 传递依赖代码)都能读 env,
      # token 只在 deploy step 经 with: 传给 wrangler-action
      PYSHADE_DOCS_BASE_URL: ${{ vars.PYSHADE_DOCS_BASE_URL || 'https://pyshade-docs.pages.dev' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      - run: uv sync --group dev
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend build:css
      - name: Materialize vendor tree
        run: uv run python scripts/build_vendor.py
      - run: uv build --wheel
      - name: Install wheel into clean venv (+content extra deps)
        run: |
          uv venv .venv-docs --python 3.13
          uv pip install --python .venv-docs dist/pyshade-*.whl mistune pygments
      - name: Build docs site (en + zh, llms.txt, md snapshots)
        run: .venv-docs/bin/python docs_site/build.py --out dist-docs
        env:
          PYTHONPATH: docs_site/src
      - name: Assert site layout
        run: |
          for f in index.html llms.txt llms-full.txt \
                   en/index.html en/app.js en/style.css en/demo-mock.js en/llms.txt \
                   zh/index.html zh/demo-mock.js zh/llms.txt \
                   en/md/components/Button.md zh/md/guides/quickstart.md; do
            test -f "dist-docs/$f" || { echo "缺 $f"; exit 1; }
          done
          grep -q 'demo-mock.js' dist-docs/en/index.html
          grep -q '<html lang="en">' dist-docs/en/index.html
          grep -q '<html lang="zh-CN">' dist-docs/zh/index.html
          grep -q '<title>PyShade Docs</title>' dist-docs/en/index.html
          echo "site layout OK ($(du -sh dist-docs | cut -f1))"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-site
          path: dist-docs/
      # secrets context 在 step if 不可用:用零第三方代码的探测 step 出布尔标志,
      # token 只暴露给它与 deploy step,不进构建链路的 env
      - name: Probe CF secrets
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then echo "configured=true" >> "$GITHUB_OUTPUT"; else echo "configured=false" >> "$GITHUB_OUTPUT"; fi
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-docs --project-name=pyshade-docs
      - name: Deploy skipped (CF secrets 未配置)
        if: steps.cf.outputs.configured != 'true'
        run: echo "未配置 CLOUDFLARE_API_TOKEN,跳过部署;产物见 docs-site artifact"
