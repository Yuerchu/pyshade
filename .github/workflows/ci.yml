name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 最小权限:全程跑第三方 action 与依赖代码,默认 token 不该有写权
permissions:
  contents: read

env:
  # Windows runner 默认 cp1252,中文输出会 UnicodeEncodeError
  PYTHONUTF8: '1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      # native 组让 pyright 能解析 pytauri_wheel(_harness.py 的惰性 import)
      - run: uv sync --group dev --extra native --extra content
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.10'
          - os: ubuntu-latest
            python: '3.13'
          - os: windows-latest
            python: '3.13'
          - os: macos-latest
            python: '3.13'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync --group dev --extra native --extra content
      - run: uv run pytest -q --junitxml=junit.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: junit-${{ matrix.os }}-${{ matrix.python }}
          path: junit.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      - run: uv sync --group dev --extra content
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Compile example to generated
        run: uv run pyshade build login_form.app:app --out frontend/src/generated
        env:
          PYTHONPATH: examples/login_form/src
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend lint
      - run: pnpm -C frontend build
      - run: pnpm -C frontend build:testkit
      - run: pnpm -C frontend build:css
      - name: CSS coverage gate
        run: uv run python scripts/check_css_coverage.py
      # 组件画廊 + 任务看板 + 文档站:全组件/路由/Each/内容组件的生成代码过真实 tsc
      - name: Compile gallery & board examples
        run: |
          uv run pyshade build component_gallery.app:app --out frontend/src/generated-gallery
          uv run pyshade build task_board.app:app --out frontend/src/generated-board
        env:
          PYTHONPATH: examples/component_gallery/src:examples/task_board/src
      - name: Compile docs site (en)
        run: uv run pyshade build docs_site.app:app --out frontend/src/generated-docs
        env:
          PYTHONPATH: docs_site/src
          PYSHADE_DOCS_LOCALE: en
      # zh 的 markdown 在编译期渲染(mistune):不在 PR 期编译,坏内容要合入 main 后才在 docs.yml 炸
      - name: Compile docs site (zh)
        run: uv run pyshade build docs_site.app:app --out frontend/src/generated-docs-zh
        env:
          PYTHONPATH: docs_site/src
          PYSHADE_DOCS_LOCALE: zh
      - name: Typecheck all generated output
        run: pnpm -C frontend typecheck

  # 发版产物模拟:有 Node 的一侧把 wheel(含 _frontend 源码/vendor/style.css)与
  # esbuild 版 testkit 造好,交给 bundle-zero-node 消费
  wheel-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      - run: uv sync --group dev
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend build:css
      - name: Materialize vendor tree
        run: uv run python scripts/build_vendor.py
      - name: Build testkit with esbuild (vite 对照)
        run: uv run pyshade bundle-testkit --out testkit-esbuild/testkit.js
      - run: uv build --wheel
        env:
          PYSHADE_REQUIRE_FRONTEND_ASSETS: '1'
      - name: Assert wheel carries frontend assets
        run: uv run python scripts/assert_wheel_assets.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pyshade-wheel
          path: dist/pyshade-*.whl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: testkit-esbuild
          path: testkit-esbuild/testkit.js

  # 零 Node 验收:剔除 node 后以 wheel 安装的 pyshade 走包数据路径打包,真机 E2E 吃产物
  bundle-zero-node:
    runs-on: windows-latest
    needs: wheel-assets
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pyshade-wheel
          path: wheel-dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: testkit-esbuild
          path: testkit-esbuild
      - name: Strip node from PATH
        shell: pwsh
        run: |
          $dirs = $env:Path -split ';' | Where-Object {
            $_ -and -not (Test-Path (Join-Path $_ 'node.exe')) -and -not (Test-Path (Join-Path $_ 'npm.cmd'))
          }
          "PATH=" + ($dirs -join ';') | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Assert node unavailable
        shell: pwsh
        run: |
          if (Get-Command node -ErrorAction SilentlyContinue) { Write-Error 'node 仍可执行'; exit 1 }
          if (Get-Command npm -ErrorAction SilentlyContinue) { Write-Error 'npm 仍可执行'; exit 1 }
          Write-Output 'node/npm 已剔除'
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~\AppData\Local\pyshade
          key: esbuild-${{ runner.os }}-${{ hashFiles('src/pyshade/bundler/_esbuild.py') }}
      - name: Install wheel into clean venv
        shell: bash
        run: |
          uv venv .venv-wheel --python 3.13
          uv pip install --python .venv-wheel/Scripts/python.exe wheel-dist/pyshade-*.whl pytest pytauri-wheel anyio
      - name: pyshade bundle (zero node)
        shell: bash
        run: .venv-wheel/Scripts/pyshade bundle login_form.app:app --out dist-bundle
        env:
          PYTHONPATH: examples/login_form/src
      - name: Assert bundle artifacts
        shell: bash
        run: |
          for f in index.html app.js style.css; do
            test -f "dist-bundle/$f" || { echo "缺 $f"; exit 1; }
          done
          if grep -q 'process.env' dist-bundle/app.js; then echo 'NODE_ENV define 未生效'; exit 1; fi
          echo "bundle 三件套 OK($(stat -c%s dist-bundle/app.js 2>/dev/null || wc -c < dist-bundle/app.js) bytes)"
      - name: pyshade bundle task_board (zero node)
        shell: bash
        run: .venv-wheel/Scripts/pyshade bundle task_board.app:app --out dist-board --workdir .pyshade/board-build
        env:
          PYTHONPATH: examples/task_board/src
      - name: Native E2E on bundle output
        shell: bash
        run: .venv-wheel/Scripts/python.exe -m pytest tests/e2e_native -m e2e_native -q --junitxml=reports/native-bundle/junit.xml
        env:
          PYSHADE_E2E_DIST: ${{ github.workspace }}/dist-bundle
          PYSHADE_E2E_BOARD_DIST: ${{ github.workspace }}/dist-board
          PYSHADE_E2E_TESTKIT: ${{ github.workspace }}/testkit-esbuild/testkit.js
          WEBVIEW2_USER_DATA_FOLDER: ${{ runner.temp }}/wv2-bundle
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: native-bundle-report
          path: reports/

  # standalone 打包冒烟:Rust 编译 + nsis 出包 + 裸 exe PYSHADE_SMOKE(链路不烂的日常保险)
  package-smoke:
    runs-on: windows-latest
    needs: wheel-assets
    timeout-minutes: 40
    env:
      PYSHADE_CACHE_DIR: ${{ github.workspace }}/.pyshade-cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 分支头 2026-07
        with:
          toolchain: stable  # pin SHA 后 @ref 不再承载 toolchain 语义,必须显式
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: tauri-cli@2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pyshade-wheel
          path: wheel-dist
      - name: Install wheel into clean venv
        shell: bash
        run: |
          uv venv .venv-pkg --python 3.13
          uv pip install --python .venv-pkg wheel-dist/pyshade-*.whl
      - name: Scaffold packaging project
        shell: bash
        run: .venv-pkg/Scripts/pyshade init --dir examples/task_board
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: examples/task_board/src-tauri
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .pyshade-cache/cpython
          key: cpython-${{ runner.os }}-${{ hashFiles('src/pyshade/packager/_cpython.py') }}
      - name: Package (nsis only)
        shell: bash
        run: |
          .venv-pkg/Scripts/pyshade package task_board.app:app --dir examples/task_board \
            --with wheel-dist/pyshade-*.whl --bundles nsis --out dist-package
      - name: Assert installer exists
        shell: bash
        run: ls dist-package/*-setup.exe
      - name: Smoke run bare binary
        shell: bash
        env:
          PYSHADE_SMOKE: '1'
          WEBVIEW2_USER_DATA_FOLDER: ${{ runner.temp }}/wv2-package
        run: examples/task_board/src-tauri/target/bundle-release/task-board.exe

  e2e-native:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          python-version: '3.13'
      - run: uv sync --group dev --extra native --extra content
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Compile example to generated
        run: uv run pyshade build login_form.app:app --out frontend/src/generated
        env:
          PYTHONPATH: examples/login_form/src
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend build
      - run: pnpm -C frontend build:testkit
      - name: Run native E2E (7 verification cases)
        run: uv run pytest tests/e2e_native -m e2e_native -q --junitxml=reports/native/junit.xml
        env:
          WEBVIEW2_USER_DATA_FOLDER: ${{ runner.temp }}/wv2
      - name: Publish report to step summary
        if: always()
        shell: bash
        run: |
          if [ -f reports/native/report.md ]; then
            cat reports/native/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: native-report
          path: reports/native/
