name: Release

# 三平台 standalone 安装包 + PyPI 发布:tag 推送出正式产物(draft release + PyPI,
# PyPI 侧经 environment 审批闸门);workflow_dispatch 用于链路演练(可选发 TestPyPI)
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: '演练时把 wheel 发到哪里'
        type: choice
        options: [none, testpypi]
        default: none

env:
  PYTHONUTF8: '1'

jobs:
  # 与主 CI 的 wheel-assets 同构:有 Node 的一侧把 wheel(含 _frontend 资产)造好
  wheel-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'
      - run: uv sync --group dev
      - name: Assert tag matches __version__
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(grep -oP "__version__ = '\K[^']+" src/pyshade/__init__.py)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag v$tag 与 __version__ $version 不一致"; exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend build:css
      - name: Materialize vendor tree
        run: uv run python scripts/build_vendor.py
      - run: uv build --wheel
        env:
          PYSHADE_REQUIRE_FRONTEND_ASSETS: '1'
      - name: Assert wheel carries frontend assets
        run: uv run python scripts/assert_wheel_assets.py
      - uses: actions/upload-artifact@v4
        with:
          name: pyshade-wheel
          path: dist/pyshade-*.whl

  package:
    needs: wheel-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
          - os: macos-latest
            bundles: dmg,app
          - os: ubuntu-22.04
            bundles: deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      PYSHADE_CACHE_DIR: ${{ github.workspace }}/.pyshade-cache
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2
      - name: Linux system deps (WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev xvfb
      - uses: actions/download-artifact@v4
        with:
          name: pyshade-wheel
          path: wheel-dist
      - name: Install wheel into clean venv
        shell: bash
        run: |
          uv venv .venv-pkg --python 3.13
          uv pip install --python .venv-pkg wheel-dist/pyshade-*.whl
      - name: Scaffold packaging project (模板即真相,现场生成)
        shell: bash
        run: |
          VENV_BIN=$(ls -d .venv-pkg/Scripts 2>/dev/null || echo .venv-pkg/bin)
          "$VENV_BIN/pyshade" init --dir examples/task_board
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/task_board/src-tauri
      - uses: actions/cache@v4
        with:
          path: .pyshade-cache/cpython
          key: cpython-${{ runner.os }}-${{ hashFiles('src/pyshade/packager/_cpython.py') }}
      - name: Package
        shell: bash
        run: |
          VENV_BIN=$(ls -d .venv-pkg/Scripts 2>/dev/null || echo .venv-pkg/bin)
          "$VENV_BIN/pyshade" package task_board.app:app --dir examples/task_board \
            --with wheel-dist/pyshade-*.whl --bundles ${{ matrix.bundles }} --out dist-package
      # Unix 的 rpath 面向安装后布局($ORIGIN/../lib/<product>/lib 与 .app Resources),
      # 裸 exe 平铺资源找不到 libpython → smoke 直接验安装后形态(比裸 exe 更真实)
      - name: Smoke run (PYSHADE_SMOKE=1)
        shell: bash
        env:
          PYSHADE_SMOKE: '1'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            examples/task_board/src-tauri/target/bundle-release/task-board.exe
          elif [ "$RUNNER_OS" = "Linux" ]; then
            sudo dpkg -i dist-package/*.deb
            xvfb-run -a /usr/bin/task-board
          else
            APP=$(ls -d dist-package/*.app | head -1)
            "$APP"/Contents/MacOS/*
          fi
      - name: Report artifact sizes
        shell: bash
        run: ls -lhR dist-package | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: dist-package/

  # 正式发布:三平台安装包 + smoke 全绿才发;environment: pypi 配 required reviewer
  # 即"tag 推送 → 全绿 → 人工批准 → 发布"的闸门;纯 OIDC trusted publishing,无 token
  publish-pypi:
    needs: [wheel-assets, package]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pyshade-wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  # 演练通道:workflow_dispatch 且 publish=testpypi 时发 TestPyPI(版本需 bump devN,不可重传)
  publish-testpypi:
    needs: [wheel-assets, package]
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pyshade-wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          merge-multiple: true
          path: dist-all
      - uses: actions/download-artifact@v4
        with:
          name: pyshade-wheel
          path: dist-all
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist-all/**
          body: |
            `pip install "pyshade[native]"`(PyPI)或使用下方平台安装包。

            未签名产物说明:
            - macOS:首次打开需右键 → 打开,或 `xattr -d com.apple.quarantine <App>`
            - Windows:SmartScreen 提示时选择"仍要运行"
