# 组件类 docstring 的英文摘要(en 页使用;键集合与组件类名对账)

[docstrings]
Accordion = "shadcn Accordion. All children must be `AccordionItem` (enforced at compile time). Uncontrolled in M2 — open/close state is owned by radix."
AccordionItem = "Slot child container for `Accordion`: `title` renders into the AccordionTrigger, `children` into the AccordionContent. `value` defaults to the title; only valid as a direct child of `Accordion` (compile-time rule)."
Alert = "shadcn Alert: an inline callout that sits in the content flow (not an overlay)."
AlertDialog = "shadcn AlertDialog: a confirmation dialog with a fixed structure and no free-form children — for a form inside a dialog, compose `Dialog` + `Button` instead. `on_confirm` fires on confirm (the radix Action closes the dialog automatically); `on_cancel` fires on every cancel path (ESC / overlay / cancel button). Both payloads are `{}`."
Badge = "shadcn Badge: a short label."
Button = "shadcn Button. With `submit=True`, the event payload carries the page's named input values (including sensitive ones). Besides a handler, `on_click` also accepts zero-IPC client actions: `navigate(Page)` / `set_color_scheme()`."
Card = "Container component compiled to the shadcn Card + CardHeader + CardTitle + CardDescription + CardContent combination. `children` are passed positionally and may reference page fields declared earlier."
Checkbox = "shadcn Checkbox, with the same semantics as `Switch`: checking is a discrete, explicit action, so reporting every toggle to the server is legitimate. Radix's indeterminate tri-state is not supported in M2 — the onCheckedChange payload is normalized via `checked === true`."
CodeBlock = "Code block highlighted into static HTML at compile time via pygments (requires `pyshade[content]`). `code` and `language` are **build-time constants**; an unknown `language` fails the build — use the default `'text'` for plain text."
Dialog = "shadcn Dialog: a modal dialog. `open` is client-owned: bind a `ClientVal` for **controlled** state (radix writes back through onOpenChange); a plain value maps to `defaultOpen` only (initial value — later Updates have no effect), and `ServerRef` is rejected to avoid dual writers. `trigger` is a single-component slot (typically a Button) whose click is owned by the radix Trigger — do not bind `on_click` on it."
Each = "List-rendering container: `Each(ChatState.messages, render=lambda m: Text(m.text), key='id')`. The `render` callback runs once at construction time; model items receive an ItemProxy whose attributes become `Expr` leaves, scalar items receive an `Expr` leaf directly. `key` defaults to the index (when given, it must be a str/int field of the item model), and the components/events allowed inside the template are checked at compile time."
Heading = "Heading (h1-h4). `text` may be a plain value (patchable via Update), a str expression, or a `ServerState` field. `level` is a **build-time constant** fixing the generated tag and typography class — a runtime patch cannot change the element type, so it is locked at construction."
Input = "**Controlled** text input: keystrokes only update local frontend state, and `on_change` follows DOM change semantics (fires on blur commit). Binding `value` to a `ClientVal[str]` makes that ClientVal its sole writer (they share the same useState)."
Link = "External link with browser `<a>` semantics; `text` and `href` are **build-time constants**. Use `navigate(Page)` for in-app navigation instead of pointing a Link at an internal page; `href` accepts http(s)/mailto only, validated at construction time."
Markdown = "Long-form Markdown rendered to static HTML at compile time via mistune (requires `pyshade[content]`). `source` is a **build-time constant**: the HTML is finalized at compile time, so patching the source at runtime cannot trigger a re-render. Raw HTML is always escaped; runtime-dynamic markdown (e.g. LLM output) is not supported."
PasswordInput = "Sensitive input: it exposes no event fields, so a change handler cannot be attached — guaranteed at the type level. The frontend keeps it uncontrolled (the value never enters React state and emits no keystroke events); it is merged into the payload only when a `submit=True` event fires. `value_of(password)` is rejected both by pyright and at runtime."
Progress = "shadcn Progress: a progress bar taking values 0-100. Binding a `ServerRef` and pushing updates is the primary use case."
RadioGroup = "shadcn RadioGroup: a single-choice group; `on_change` reports immediately on selection."
ScrollArea = "shadcn ScrollArea: a fixed-height scroll container; `height` is a CSS length string."
Select = "shadcn Select: a dropdown single select. Selection is a discrete, explicit action, so `on_change` reports immediately (same philosophy as `Switch`)."
Separator = "shadcn Separator: a divider line."
Skeleton = "shadcn Skeleton: a loading placeholder; `width` and `height` are CSS length strings (e.g. `'8rem'`, `'100%'`)."
Slider = "shadcn Slider: a numeric slider. Continuing the zero-keystroke-IPC philosophy, dragging (onValueChange) only updates local frontend state; `on_change` crosses the boundary only on release (onValueCommit)."
Stack = "Vertical layout container of the content component family: borderless (no card chrome), meant to host document / long-form page flow. `width` selects the content column width preset (sm=24rem / md=48rem / lg=64rem / full) and is a **build-time constant** — as with `Heading.level`, a runtime patch cannot change the generated class."
Switch = "shadcn Switch. Toggling is a discrete, explicit action, so reporting every toggle is legitimate. Binding `checked` to a `ClientVal[bool]` makes that ClientVal its sole writer (they share the same useState)."
TabItem = "Slot child container for `Tabs`: `label` renders into the TabsTrigger, `children` into the TabsContent. `value` defaults to the label; only valid as a direct child of `Tabs` (compile-time rule)."
Tabs = "shadcn Tabs. All children must be `TabItem`. `value` is client-owned: bind a `ClientVal` for **controlled** state; a plain empty string means uncontrolled, with `defaultValue` taken from the first item."
Text = "Plain text display. `text` may be a plain value (patchable via Update), a str expression, or a `ServerState` field."
Textarea = "Multi-line text input with the same semantics as `Input`: keystrokes stay in local state, and `on_change` maps to the blur commit."
Tooltip = "shadcn Tooltip: a hover hint in wrapper-container form (`children` is exactly one host component). Because asChild requires exactly one element, the host's `visible` must stay at the default `True` — control visibility on the Tooltip itself (enforced by a compile-time rule). The open state is managed by radix hover semantics and is not exposed in M2."
